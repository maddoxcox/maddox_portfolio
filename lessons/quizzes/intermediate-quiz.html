<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Quiz - JS Learning</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body data-lesson="intermediate-quiz">
    <header>
        <nav>
            <a href="../../index.html" class="logo">JS<span>Learning</span></a>
            <ul class="nav-links">
                <li><a href="../../index.html#basics">Basics</a></li>
                <li><a href="../../index.html#intermediate">Intermediate</a></li>
                <li><a href="../../index.html#quizzes">Quizzes</a></li>
            </ul>
            <button class="mobile-menu">☰</button>
        </nav>
    </header>

    <main class="quiz-container">
        <div class="quiz-header">
            <h1>Intermediate JavaScript Quiz</h1>
            <p>Challenge yourself with advanced concepts. 10 questions covering arrays, objects, DOM manipulation, and events.</p>
        </div>

        <div class="quiz-progress"></div>

        <div class="question-card"></div>

        <div class="quiz-actions">
            <button class="btn btn-secondary prev-btn" style="display: none;">Previous</button>
            <button class="btn btn-primary next-btn" style="display: none;">Next Question</button>
            <button class="btn btn-success submit-btn" style="display: none;">See Results</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>JS Learning - Learn JavaScript the interactive way</p>
        </div>
    </footer>

    <script id="quiz-data" type="application/json">
    {
        "id": "intermediate-quiz",
        "title": "Intermediate JavaScript Quiz",
        "questions": [
            {
                "question": "What does the map() method return?",
                "options": [
                    "The original array, modified",
                    "A new array with transformed elements",
                    "undefined",
                    "The number of elements processed"
                ],
                "correct": 1,
                "explanation": "map() creates a new array with the results of calling a function on every element. It doesn't modify the original array."
            },
            {
                "question": "What will this code output?",
                "code": "const arr = [1, 2, 3];\nconst result = arr.filter(x => x > 1).map(x => x * 2);\nconsole.log(result);",
                "options": ["[2, 4, 6]", "[4, 6]", "[2, 3]", "[1, 2, 3]"],
                "correct": 1,
                "explanation": "filter(x => x > 1) returns [2, 3], then map(x => x * 2) transforms it to [4, 6]."
            },
            {
                "question": "Which method would you use to add an element to the beginning of an array?",
                "options": ["push()", "pop()", "unshift()", "shift()"],
                "correct": 2,
                "explanation": "unshift() adds elements to the beginning. push() adds to the end. shift() and pop() remove elements."
            },
            {
                "question": "What is destructuring?",
                "options": [
                    "Deleting properties from an object",
                    "Extracting values from arrays or objects into variables",
                    "Converting objects to arrays",
                    "Removing duplicate values"
                ],
                "correct": 1,
                "explanation": "Destructuring is a syntax for extracting values from arrays or properties from objects into distinct variables."
            },
            {
                "question": "What will this code output?",
                "code": "const obj = { a: 1, b: 2 };\nconst { a, c = 3 } = obj;\nconsole.log(a, c);",
                "options": ["1 undefined", "1 3", "undefined 3", "Error"],
                "correct": 1,
                "explanation": "Destructuring extracts a (1) from obj. Since c doesn't exist in obj, the default value 3 is used."
            },
            {
                "question": "What does document.querySelector('.btn') return if no element matches?",
                "options": ["undefined", "null", "An empty NodeList", "An error"],
                "correct": 1,
                "explanation": "querySelector returns null if no matching element is found. querySelectorAll returns an empty NodeList."
            },
            {
                "question": "What is event bubbling?",
                "options": [
                    "Events trigger from parent to child",
                    "Events trigger from child to parent",
                    "Events only trigger on the target element",
                    "Events are delayed until the page loads"
                ],
                "correct": 1,
                "explanation": "Event bubbling means events propagate upward from the target element to its ancestors (child to parent)."
            },
            {
                "question": "What method stops an event from propagating to parent elements?",
                "options": [
                    "e.preventDefault()",
                    "e.stopPropagation()",
                    "e.cancelBubble()",
                    "e.stop()"
                ],
                "correct": 1,
                "explanation": "stopPropagation() prevents the event from bubbling up. preventDefault() stops the default browser behavior."
            },
            {
                "question": "What is the output of this reduce operation?",
                "code": "const nums = [1, 2, 3, 4];\nconst sum = nums.reduce((acc, n) => acc + n, 0);\nconsole.log(sum);",
                "options": ["0", "4", "10", "[1, 2, 3, 4]"],
                "correct": 2,
                "explanation": "reduce() accumulates values. Starting with 0: 0+1=1, 1+2=3, 3+3=6, 6+4=10."
            },
            {
                "question": "What is the benefit of event delegation?",
                "options": [
                    "Faster initial page load",
                    "Better browser compatibility",
                    "Single listener handles events for multiple/dynamic elements",
                    "Events never bubble"
                ],
                "correct": 2,
                "explanation": "Event delegation uses a single listener on a parent to handle events for all children, including dynamically added elements."
            }
        ]
    }
    </script>

    <script src="../../js/main.js"></script>
    <script src="../../js/quiz.js"></script>
</body>
</html>
